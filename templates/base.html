<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CalTrack{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <!-- Sticky top navigation -->
  <nav class="topnav">
    <div class="nav-inner">
      <span class="brand">CalTrack</span>
      <span class="nav-date">{{ today }}</span>
      <div class="nav-links">
        <a href="{{ url_for('index') }}"
           class="{% if request.endpoint == 'index' %}active{% endif %}">Dashboard</a>
        <a href="{{ url_for('history') }}"
           class="{% if request.endpoint == 'history' %}active{% endif %}">History</a>
        <a href="{{ url_for('audit_logs') }}"
           class="{% if request.endpoint == 'audit_logs' %}active{% endif %}">Audit Logs</a>
        <a href="{{ url_for('prompt_versions_page') }}"
           class="{% if request.endpoint == 'prompt_versions_page' %}active{% endif %}">Prompts</a>
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
