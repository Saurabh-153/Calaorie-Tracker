<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP — CalTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1 class="brand auth-brand">CalTrack</h1>
    <p class="auth-sub">A 6-digit code was sent to <strong>{{ email }}</strong>.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="auth-alert auth-alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('verify') }}" class="auth-form">
      <label for="code">Enter your code</label>
      <input type="text" id="code" name="code" required autofocus
             maxlength="6" pattern="\d{6}" inputmode="numeric"
             placeholder="123456" class="auth-input auth-input-otp" />
      <button type="submit" class="btn btn-teal auth-btn">Verify</button>
    </form>

    <p class="auth-footer">
      Wrong email?
      <a href="{{ url_for('login') }}">Start over</a>
    </p>
  </div>
</body>
</html>
