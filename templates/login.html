<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — CalTrack</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1 class="brand auth-brand">CalTrack</h1>
    <p class="auth-sub">Enter your email to receive a one-time login code.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="auth-alert auth-alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" required autofocus
             placeholder="you@example.com" class="auth-input" />
      <button type="submit" class="btn btn-teal auth-btn">Send OTP</button>
    </form>
  </div>
</body>
</html>
