
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--surface-0)}
.page{max-width:860px;margin:0 auto;padding:0 0 2rem}
.topnav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surface-2);border-bottom:0.5px solid var(--border)}
.brand{display:flex;align-items:center;gap:8px}
.brand-name{font-size:16px;font-weight:500;color:var(--text-primary)}
.brand-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75}
.brand-date{font-size:12px;color:var(--text-muted);margin-left:4px}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-btn{padding:6px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-secondary)}
.nav-btn.active{background:#1D9E75;color:#fff}
.nav-btn:hover:not(.active){background:var(--surface-1)}
.nav-icon{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;padding:4px}
.content{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.history-header{display:flex;align-items:center;justify-content:space-between}
.history-title{font-size:18px;font-weight:500;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.toggle-group{display:flex;background:var(--surface-1);border:0.5px solid var(--border);border-radius:var(--radius);padding:2px;gap:2px}
.toggle-btn{padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-secondary)}
.toggle-btn.active{background:#1D9E75;color:#fff}
.stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.stat-tile{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-label{font-size:11px;font-weight:500;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:500;color:var(--text-primary)}
.stat-unit{font-size:13px;color:var(--text-muted);font-weight:400}
.stat-sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.chart-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:18px 20px}
.chart-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-title{font-size:13px;font-weight:500;color:var(--text-secondary);letter-spacing:0.05em;text-transform:uppercase}
.legend{display:flex;gap:14px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted)}
.leg-dot{width:8px;height:8px;border-radius:2px}
.chart-wrap{position:relative;height:240px}
.day-entries{display:flex;flex-direction:column;gap:10px}
.day-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none}
.day-header:hover{background:var(--surface-1)}
.day-left{display:flex;align-items:center;gap:10px}
.day-name{font-size:14px;font-weight:500;color:var(--text-primary)}
.day-date{font-size:12px;color:var(--text-muted)}
.day-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-empty{background:var(--surface-1);color:var(--text-muted);border:0.5px solid var(--border)}
.badge-ok{background:#E1F5EE;color:#0F6E56}
.badge-over{background:#FCEBEB;color:#A32D2D}
.day-right{display:flex;align-items:center;gap:10px}
.day-kcal{font-size:13px;font-weight:500;color:var(--text-primary)}
.day-goal-txt{font-size:12px;color:var(--text-muted)}
.day-chevron{font-size:14px;color:var(--text-muted);transition:transform 0.2s}
.day-chevron.open{transform:rotate(180deg)}
.day-prog{height:3px;background:var(--surface-1)}
.day-prog-fill{height:100%;transition:width 0.3s}
.day-body{display:none;border-top:0.5px solid var(--border)}
.day-body.open{display:block}
.no-entries{padding:14px 16px;font-size:13px;color:var(--text-muted);font-style:italic}
table.dtbl{width:100%;border-collapse:collapse}
table.dtbl th{padding:8px 14px;font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);text-align:left;background:var(--surface-1);border-bottom:0.5px solid var(--border)}
table.dtbl th.r{text-align:right}
table.dtbl td{padding:10px 14px;font-size:13px;border-bottom:0.5px solid var(--border);vertical-align:middle}
table.dtbl tbody tr:last-child td{border-bottom:none}
table.dtbl tbody tr:hover td{background:var(--surface-1)}
.fn{font-weight:500;color:var(--text-primary)}
.fq{font-size:11px;color:var(--text-muted);margin-top:1px}
.nr{text-align:right;font-variant-numeric:tabular-nums}
.vc{color:var(--text-primary);font-weight:500}
.vp{color:#7F77DD}
.vb{color:#EF9F27}
.vf{color:var(--text-secondary)}
table.dtbl tfoot td{background:var(--surface-1);border-top:0.5px solid var(--border-strong);font-size:13px;font-weight:500;padding:10px 14px}
</style>

<div class="page">
  <h2 class="sr-only">CalTrack history page</h2>
  <nav class="topnav">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">CalTrack</span>
      <span class="brand-date">2026-06-27</span>
    </div>
    <div class="nav-links">
      <button class="nav-btn">Dashboard</button>
      <button class="nav-btn active">History</button>
      <button class="nav-icon" aria-label="Settings"><i class="ti ti-settings" aria-hidden="true"></i></button>
    </div>
  </nav>

  <div class="content">
    <div class="history-header">
      <div class="history-title">
        <i class="ti ti-calendar-stats" style="font-size:20px;color:#1D9E75" aria-hidden="true"></i>History
      </div>
      <div class="toggle-group">
        <button class="toggle-btn active">Weekly</button>
        <button class="toggle-btn">Monthly</button>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-tile">
        <div class="stat-label">Selected range</div>
        <div class="stat-val">7 <span class="stat-unit">days</span></div>
        <div class="stat-sub">Jun 21 – Jun 27</div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Total calories</div>
        <div class="stat-val">3,785 <span class="stat-unit">kcal</span></div>
        <div class="stat-sub">across 3 active days</div>
      </div>
      <div class="stat-tile">
        <div class="stat-label">Average per day</div>
        <div class="stat-val">541 <span class="stat-unit">kcal</span></div>
        <div class="stat-sub" style="color:#E24B4A">27% of 2000 kcal goal</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-top">
        <span class="chart-title">7-day calorie overview</span>
        <div class="legend">
          <div class="leg-item"><span class="leg-dot" style="background:#EF9F27"></span>Carbs</div>
          <div class="leg-item"><span class="leg-dot" style="background:#7F77DD"></span>Protein</div>
          <div class="leg-item"><span class="leg-dot" style="background:#1D9E75"></span>Fat</div>
          <div class="leg-item"><span class="leg-dot" style="background:rgba(229,75,74,0.25);border:1px dashed #E24B4A"></span>Goal</div>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="histChart"></canvas>
      </div>
    </div>

    <div class="day-entries" id="dayEntries"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const DAYS=[
  {day:'Sun',date:'06/21',full:'2026-06-21',cal:0,pro:0,carb:0,fat:0,goal:2000,items:[]},
  {day:'Mon',date:'06/22',full:'2026-06-22',cal:0,pro:0,carb:0,fat:0,goal:2000,items:[]},
  {day:'Tue',date:'06/23',full:'2026-06-23',cal:0,pro:0,carb:0,fat:0,goal:2000,items:[]},
  {day:'Wed',date:'06/24',full:'2026-06-24',cal:0,pro:0,carb:0,fat:0,goal:2000,items:[]},
  {day:'Thu',date:'06/25',full:'2026-06-25',cal:1373,pro:89.4,carb:133.3,fat:56.6,goal:1800,items:[
    {name:'Egg',qty:'5 eggs',cal:375,pro:30,carb:2.5,fat:25},
    {name:'Chicken Breast',qty:'1 piece 25g',cal:41,pro:7.8,carb:0,fat:0.9},
    {name:'Curd',qty:'100g',cal:98,pro:11,carb:3.6,fat:4.3},
    {name:'Rice',qty:'150g cooked',cal:195,pro:4.1,carb:42,fat:0.5},
    {name:'Dal (toor)',qty:'1 cup',cal:130,pro:9,carb:22,fat:0.5},
    {name:'Banana',qty:'1 medium',cal:105,pro:1.3,carb:27,fat:0.3},
    {name:'Peanuts',qty:'1 handful',cal:170,pro:7.8,carb:5.5,fat:14.7},
    {name:'Roti',qty:'2 pieces',cal:160,pro:5.4,carb:30,fat:0.8},
  ]},
  {day:'Fri',date:'06/26',full:'2026-06-26',cal:1125,pro:95,carb:81.4,fat:31,goal:2000,items:[
    {name:'Oats',qty:'40g dry',cal:150,pro:5,carb:27,fat:3},
    {name:'Milk',qty:'1 glass',cal:150,pro:8,carb:12,fat:8},
    {name:'Chicken Breast',qty:'100g',cal:165,pro:31,carb:0,fat:3.6},
    {name:'Apple',qty:'1 medium',cal:78,pro:0.4,carb:21,fat:0.2},
    {name:'Egg White',qty:'4 pieces',cal:68,pro:14.4,carb:0,fat:0},
    {name:'Dal',qty:'1 cup',cal:130,pro:9,carb:22,fat:0.5},
    {name:'Roti',qty:'2 pieces',cal:160,pro:5.4,carb:30,fat:0.8},
    {name:'Salad',qty:'1 bowl',cal:30,pro:1,carb:6,fat:0.2},
  ]},
  {day:'Today',date:'06/27',full:'2026-06-27',cal:1287,pro:95,carb:162.5,fat:40.7,goal:1500,items:[
    {name:'Rolled Oats',qty:'40g dry',cal:150,pro:5,carb:27,fat:3},
    {name:'Apple',qty:'1 medium',cal:78,pro:0.4,carb:21,fat:0.2},
    {name:'Banana',qty:'1 medium',cal:105,pro:1.3,carb:27,fat:0.3},
    {name:'Whey Protein Isolate',qty:'15g half scoop',cal:55,pro:13,carb:0.5,fat:0.3},
    {name:'Double Toned Milk',qty:'1 cup 240ml',cal:120,pro:8.4,carb:12,fat:3.6},
    {name:'Upma',qty:'1 bowl 200ml',cal:230,pro:4,carb:40,fat:6},
    {name:'Peanuts',qty:'1 handful',cal:51,pro:7.5,carb:4.5,fat:14.7},
    {name:'Coffee',qty:'1 cup',cal:215,pro:10,carb:18,fat:9},
    {name:'Sugar',qty:'12.5g',cal:50,pro:0,carb:12.5,fat:0},
    {name:'Egg White',qty:'4 pieces',cal:68,pro:14.4,carb:0,fat:0},
    {name:'Chicken Breast',qty:'100g',cal:165,pro:31,carb:0,fat:3.6},
  ]},
];

function fmt(n){return n%1===0?n:parseFloat(n.toFixed(1));}

const maxCal=Math.max(...DAYS.map(d=>d.cal),2200);
const yMax=Math.ceil(maxCal/500)*500+200;

const ctx=document.getElementById('histChart').getContext('2d');
new Chart(ctx,{
  type:'bar',
  data:{
    labels:DAYS.map(d=>d.day+'\n'+d.date),
    datasets:[
      {
        label:'Carbs kcal',
        data:DAYS.map(d=>d.carb*4),
        backgroundColor:'#EF9F27',
        borderRadius:{topLeft:0,topRight:0,bottomLeft:3,bottomRight:3},
        stack:'cal'
      },
      {
        label:'Protein kcal',
        data:DAYS.map(d=>d.pro*4),
        backgroundColor:'#7F77DD',
        borderRadius:0,
        stack:'cal'
      },
      {
        label:'Fat kcal',
        data:DAYS.map(d=>d.fat*9),
        backgroundColor:'#1D9E75',
        borderRadius:{topLeft:3,topRight:3,bottomLeft:0,bottomRight:0},
        stack:'cal'
      },
      {
        label:'Goal',
        type:'line',
        data:DAYS.map(d=>d.goal),
        borderColor:'#E24B4A',
        borderWidth:1.5,
        borderDash:[5,4],
        pointRadius:0,
        pointHoverRadius:0,
        fill:false,
        tension:0,
        stack:undefined
      }
    ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
      legend:{display:false},
      tooltip:{
        callbacks:{
          title:items=>items[0].label.replace('\n',' '),
          label:item=>{
            if(item.dataset.label==='Goal') return `Goal: ${item.raw} kcal`;
            const d=DAYS[item.dataIndex];
            if(item.dataset.label==='Fat kcal') return `Fat: ${fmt(d.fat)}g → ${Math.round(d.fat*9)} kcal`;
            if(item.dataset.label==='Protein kcal') return `Protein: ${fmt(d.pro)}g → ${Math.round(d.pro*4)} kcal`;
            if(item.dataset.label==='Carbs kcal') return `Carbs: ${fmt(d.carb)}g → ${Math.round(d.carb*4)} kcal`;
          },
          footer:items=>{
            const d=DAYS[items[0].dataIndex];
            return d.cal>0?`Total: ${d.cal} kcal`:'';
          }
        }
      }
    },
    scales:{
      x:{
        grid:{display:false},
        ticks:{color:'#888780',font:{size:11}},
        stacked:true
      },
      y:{
        grid:{color:'rgba(128,128,128,0.1)',drawBorder:false},
        ticks:{
          color:'#888780',
          font:{size:11},
          callback:v=>v===0?'0':v>=1000?(v/1000).toFixed(1)+'k':v
        },
        stacked:true,
        max:yMax,
        min:0
      }
    },
    animation:{duration:600}
  }
});

const container=document.getElementById('dayEntries');
container.innerHTML=[...DAYS].reverse().map((d,i)=>{
  const pct=d.goal>0?Math.min(100,Math.round((d.cal/d.goal)*100)):0;
  const over=d.cal>d.goal;
  const empty=d.cal===0;
  const badgeCls=empty?'badge-empty':over?'badge-over':'badge-ok';
  const badgeTxt=empty?'No entries':over?'Over goal':'On track';
  const fillColor=over?'#E24B4A':'#1D9E75';
  const rows=d.items.map(it=>`
    <tr>
      <td><div class="fn">${it.name}</div><div class="fq">${it.qty}</div></td>
      <td class="nr vc">${fmt(it.cal)}</td>
      <td class="nr vp">${fmt(it.pro)}g</td>
      <td class="nr vb">${fmt(it.carb)}g</td>
      <td class="nr vf">${fmt(it.fat)}g</td>
    </tr>
  `).join('');
  const tot=d.items.reduce((a,it)=>({cal:a.cal+it.cal,pro:a.pro+it.pro,carb:a.carb+it.carb,fat:a.fat+it.fat}),{cal:0,pro:0,carb:0,fat:0});
  return `
    <div class="day-card">
      <div class="day-header" role="button" aria-expanded="false">
        <div class="day-left">
          <div>
            <span class="day-name">${d.day}</span>
            <span class="day-date" style="margin-left:6px">${d.full}</span>
          </div>
          <span class="day-badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="day-right">
          <span class="day-kcal">${d.cal.toLocaleString()} kcal</span>
          <span class="day-goal-txt">/ ${d.goal.toLocaleString()}</span>
          <i class="ti ti-chevron-down day-chevron" aria-hidden="true"></i>
        </div>
      </div>
      <div class="day-prog"><div class="day-prog-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      <div class="day-body">
        ${empty
          ?`<div class="no-entries"><i class="ti ti-moon" style="font-size:13px;margin-right:5px;vertical-align:-1px" aria-hidden="true"></i>No food logged this day</div>`
          :`<table class="dtbl">
            <thead><tr>
              <th style="width:44%">Food</th>
              <th class="r" style="width:13%">kcal</th>
              <th class="r" style="width:14%">Protein</th>
              <th class="r" style="width:13%">Carbs</th>
              <th class="r" style="width:13%">Fat</th>
            </tr></thead>
            <tbody>${rows}</tbody>
            ${d.items.length>1?`<tfoot><tr>
              <td>Total · ${d.items.length} items</td>
              <td class="nr vc">${Math.round(tot.cal)}</td>
              <td class="nr vp">${fmt(tot.pro)}g</td>
              <td class="nr vb">${fmt(tot.carb)}g</td>
              <td class="nr vf">${fmt(tot.fat)}g</td>
            </tr></tfoot>`:''}
          </table>`
        }
      </div>
    </div>
  `;
}).join('');

container.querySelectorAll('.day-header').forEach(hdr=>{
  hdr.addEventListener('click',()=>{
    const prog=hdr.nextElementSibling;
    const body=prog.nextElementSibling;
    const chev=hdr.querySelector('.day-chevron');
    const open=body.classList.toggle('open');
    chev.classList.toggle('open',open);
    hdr.setAttribute('aria-expanded',open);
  });
});

document.querySelectorAll('.toggle-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
});

container.querySelectorAll('.day-header')[0].click();
</script>
